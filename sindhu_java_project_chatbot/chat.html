<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Java + Tavily Chatbot</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <header><h1>Java + Tavily Chatbot</h1></header>

    <main>
      <div id="chat" class="chat-window"></div>

      <form id="chat-form" class="chat-form">
        <input id="message" name="message" autocomplete="off" placeholder="Ask anything..." />
        <button type="submit">Send</button>
      </form>
    </main>

    <footer><small>Search powered by Tavily — replace API key in ApiConfig.java</small></footer>
  </div>

  <script src="/script.js"></script>
</body>
</html>
